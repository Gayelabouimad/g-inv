<div class="opening-screen">
  <div class="overlay"></div>

  <div class="content">
    <div class="inner">
      <h1 class="couple-name">{{ coupleName }}</h1>
      <p class="subtitle">{{ titleLine }}</p>
      <app-countdown-section [targetDate]="targetDate"></app-countdown-section>
      <a [href]="getGoogleCalendarUrl()" target="_blank" rel="noopener noreferrer" class="calendar-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>Add to Calendar</span>
      </a>
      <div class="swipe-hint">
        <span>Swipe to navigate</span>
      </div>
    </div>
  </div>
</div>
