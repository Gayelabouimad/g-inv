<section class="flex min-h-full w-full animate-[sectionFadeIn_500ms_ease-out_both] flex-col justify-center gap-4 p-4 md:p-5">
  <div class="mb-8 text-center">
    <h2 class="m-0 text-[clamp(2rem,8vw,3rem)] leading-[1.1] font-normal tracking-[0.01em] text-balance [font-family:'Great_Vibes',cursive]">{{ title }}</h2>
  </div>

  <div class="mx-auto flex w-full max-w-[31.25rem] flex-col items-center">
    <p class="mb-4 text-center text-[0.9rem] leading-[1.6] opacity-90 md:mb-6 md:text-[0.95rem]">{{ text }}</p>

    <div class="rounded-2xl border border-white/20 bg-[linear-gradient(160deg,rgba(255,255,255,0.11),rgba(255,255,255,0.04))] px-6 py-5 text-center shadow-[0_0.5rem_1.25rem_rgba(0,0,0,0.2)] backdrop-blur-[0.5625rem] transition-all duration-300 ease-out hover:-translate-y-[0.125rem] hover:border-white/35 hover:bg-white/15 md:px-8 md:py-6">
      <p class="m-0 mb-2 text-base font-medium uppercase tracking-[0.1em] md:text-[1.1rem]">{{ name }}</p>
      <div class="flex flex-wrap items-center justify-center">
        <p class="m-0 flex-1 text-center text-[1.1rem] font-normal tracking-[0.05em] opacity-80 md:text-[1.3rem]">{{ accountNumber }}</p>
        <button
          type="button"
          class="flex h-[3.25rem] w-[3.25rem] shrink-0 cursor-pointer items-center justify-center rounded-lg border border-white/30 bg-white/10 p-0 transition-all duration-200 ease-out hover:border-white/40 hover:bg-white/20 active:scale-95"
          [title]="copiedState() ? 'Copied!' : 'Copy account number'"
          (click)="copyToClipboard()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 640 640"
            aria-hidden="true"
            focusable="false"
            class="h-[1.8rem] w-[1.8rem] opacity-90"
            role="img"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M360 160L280 160C266.7 160 256 149.3 256 136C256 122.7 266.7 112 280 112L360 112C373.3 112 384 122.7 384 136C384 149.3 373.3 160 360 160zM360 208C397.1 208 427.6 180 431.6 144L448 144C456.8 144 464 151.2 464 160L464 512C464 520.8 456.8 528 448 528L192 528C183.2 528 176 520.8 176 512L176 160C176 151.2 183.2 144 192 144L208.4 144C212.4 180 242.9 208 280 208L360 208zM419.9 96C407 76.7 385 64 360 64L280 64C255 64 233 76.7 220.1 96L192 96C156.7 96 128 124.7 128 160L128 512C128 547.3 156.7 576 192 576L448 576C483.3 576 512 547.3 512 512L512 160C512 124.7 483.3 96 448 96L419.9 96z"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
